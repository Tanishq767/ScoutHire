<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ScoutHire | Register</title>

    <link rel="stylesheet"
          href="css/register.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="card">

        <img src="images/logo.png"
             alt="ScoutHire Logo"
             class="logo">

        <h1>Create Recruiter Account</h1>

        <p class="subtitle">

            Register your organization and begin
            recruiting exceptional talent.

        </p>

    <form id="registerForm">

        <div class="input-group">

            <input type="text"
                id="username"
                required>

            <label for="username">

                Recruiter Name

            </label>

        </div>


        <div class="input-group">

            <input type="text"
                id="companyName"
                required>

            <label for="companyName">

                Company Name

            </label>

        </div>


        <div class="input-group">

            <input type="email"
                id="email"
                required>

            <label for="email">

                Company Email

            </label>

        </div>


        <div class="input-group">

            <input type="password"
                id="password"
                required>

            <label for="password">

                Password

            </label>

        </div>


        <div class="input-group">

            <input type="password"
                id="confirmPassword"
                required>

            <label for="confirmPassword">

                Confirm Password

            </label>

        </div>

        <button type="submit">

            Create Account

        </button>

    </form>

        <p class="loginText">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>

</div>

<script src="js/register.js"></script>

</body>

</html>
