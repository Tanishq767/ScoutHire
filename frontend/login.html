<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ScoutHire | Login</title>

    <link rel="stylesheet"
          href="css/login.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="card">

        <img src="images/logo.png"
             class="logo">

        <h1>Welcome Back</h1>

        <p class="subtitle">

            Sign in to ScoutHire and continue recruiting exceptional talent.

        </p>

        <form id="loginForm">

            <div class="input-group">

                <input
                    type="email"
                    id="email"
                    required>

                <label>

                    Company Email

                </label>

            </div>

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    required>

                <label>

                    Password

                </label>

            </div>

            <button type="submit">

                Login

            </button>

        </form>

        <p class="loginText">

            Don't have an account?

            <a href="register.html">

                Register

            </a>

        </p>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
